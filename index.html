<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="author" content="Chastant Shontz">
    <meta name="description" content="Game of hangman">
    <title>Hangman</title>
    <link rel="stylesheet" href="normalize.css">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header>
    </header>
    <article>
      <h1>Hangman</h1>
      <p>Wrong Guesses: <span id="wrong">0</span> of 6</p>
      <img src="img/hangman0.png" alt="No hangman">
      <p>Guess the Word!</p>
      <p id="unknownWord"></p>
      <button type="button" class="letter" id="a" onclick="pickLetter('a')">a</button>
      <button type="button" class="letter" id="b" onclick="pickLetter('b')">b</button>
      <button type="button" class="letter" id="c" onclick="pickLetter('c')">c</button>
      <button type="button" class="letter" id="m" onclick="pickLetter('m')">m</button>
      <button type="button" class="letter" id="n" onclick="pickLetter('n')">n</button>
      <button type="button" class="letter" id="s" onclick="pickLetter('s')">s</button>
      <button type="button" class="letter" id="t" onclick="pickLetter('t')">t</button>
      <button type="reset" onclick="reset()">Reset</button>
    </article>
    <footer>
    </footer>
    <script type="text/javascript" src="page.js"></script>
  </body>
</html>
